  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #070b17;
      color: #e2e8f0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,58,237,0.15), transparent 70%),
                  radial-gradient(ellipse 60% 50% at 80% 70%, rgba(168,85,247,0.08), transparent 60%),
                  radial-gradient(ellipse 50% 40% at 20% 80%, rgba(99,102,241,0.06), transparent 50%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(168,85,247,0.3), transparent),
        radial-gradient(1px 1px at 30% 65%, rgba(124,58,237,0.2), transparent),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(168,85,247,0.3), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(124,58,237,0.2), transparent),
        radial-gradient(1px 1px at 90% 80%, rgba(168,85,247,0.25), transparent),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(99,102,241,0.2), transparent),
        radial-gradient(1px 1px at 60% 90%, rgba(168,85,247,0.15), transparent),
        radial-gradient(1px 1px at 80% 15%, rgba(124,58,237,0.2), transparent),
        radial-gradient(1.5px 1.5px at 40% 45%, rgba(168,85,247,0.15), transparent),
        radial-gradient(1px 1px at 85% 55%, rgba(99,102,241,0.2), transparent);
      animation: twinkle 8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .banner {
      position: relative;
      padding: 28px 30px 22px;
      text-align: center;
      border-bottom: 1px solid rgba(124,58,237,0.2);
      background: linear-gradient(180deg, rgba(30,27,75,0.9) 0%, rgba(15,10,40,0.6) 100%);
      backdrop-filter: blur(20px);
    }

    .banner h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .banner p {
      font-size: 0.95rem;
      color: #94a3b8;
      font-weight: 400;
    }

    .banner .badge {
      display: inline-block;
      background: linear-gradient(135deg, #6d28d9, #7c3aed);
      color: #fff;
      padding: 5px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 10px;
      letter-spacing: 0.03em;
      box-shadow: 0 0 20px rgba(124,58,237,0.3);
    }

    .back-link {
      display: inline-block;
      margin-top: 10px;
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: #c4b5fd; text-decoration: underline; }

    .social-banner {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      background: rgba(15,10,40,0.5);
      border-bottom: 1px solid rgba(124,58,237,0.08);

    .social-banner a {
      text-decoration: none;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 30px;
      background: rgba(30,27,75,0.6);
      border: 1px solid rgba(124,58,237,0.1);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.3s ease;
    }

    .social-banner a:hover {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(168,85,247,0.2));
      border-color: rgba(124,58,237,0.4);
      color: #e2e8f0;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.15);
    }

    /* ─── markmap overrides ─── */
    #mindmap {
      display: block;
      width: 100vw;
      height: calc(100vh - 165px);
      background: transparent;
    }

    .markmap-foreign {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      color: #e2e8f0 !important;
      background: rgba(15,10,40,0.8) !important;
      backdrop-filter: blur(12px) !important;
      padding: 4px 10px !important;
      border-radius: 8px !important;
      border: 1px solid rgba(124,58,237,0.15) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
      transition: all 0.2s ease !important;
    }

    .markmap-foreign:hover {
      border-color: rgba(124,58,237,0.4) !important;
      box-shadow: 0 4px 30px rgba(124,58,237,0.15) !important;
    }

    .markmap-foreign strong {
      color: #c4b5fd !important;
      font-size: 1.05em;
    }

    .markmap-foreign a {
      color: #60a5fa !important;
      text-decoration: underline;
      font-weight: 700;
      font-size: 1em;
    }

    #mindmap text {
      font-size: 13px !important;
      font-weight: 600 !important;
      fill: #f1f5f9 !important;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif !important;
      paint-order: stroke;
      stroke: #070b17;
      stroke-width: 2px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #mindmap path {
      stroke: url(#lineGradient) !important;
      stroke-width: 2.5 !important;
      opacity: 0.7;
    }

    #mindmap circle {
      fill: #a78bfa !important;
      stroke: #7c3aed !important;
      stroke-width: 2px !important;
      filter: drop-shadow(0 0 6px rgba(124,58,237,0.4));
    }

    #mindmap g:first-child > text {
      font-size: 22px !important;
      font-weight: 900 !important;
      fill: url(#rootGradient) !important;
    }

    /* toolbar */
    .markmap-toolbar {
      position: absolute !important;
      bottom: 20px !important;
      right: 20px !important;
    }

    @media (max-width: 640px) {
      .banner h1 { font-size: 1.3rem; }
      .banner p { font-size: 0.8rem; }
      #mindmap { height: calc(100vh - 180px); }
    }
